<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c0392b">
<title>红包</title>
<link rel="manifest" href="manifest.json">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
        background: #c0392b;
        display: flex; justify-content: center; align-items: center;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    .packet {
        width: min(260px, 70vw);
        background: linear-gradient(180deg, #e74c3c 0%, #a71d2a 100%);
        border-radius: 24px; padding: 40px 20px 30px;
        text-align: center; cursor: pointer;
        box-shadow: 0 8px 50px rgba(0,0,0,0.4);
    }
    .packet:active { transform: scale(0.96); }
    .circle {
        width: 70px; height: 70px; background: #f1c40f;
        border-radius: 50%; margin: 0 auto 18px;
        line-height: 70px; font-size: 38px; font-weight: bold; color: #a71d2a;
    }
    .label { color: #f1c40f; font-size: 20px; font-weight: bold; letter-spacing: 3px; }
    .sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 10px; }
    .btn {
        display: block; margin: 20px auto 0; padding: 14px;
        background: #f1c40f; color: #a71d2a; border: none;
        border-radius: 50px; font-size: 18px; font-weight: bold;
        width: 80%; cursor: pointer;
    }
    .hidden { display: none !important; }
    .msg { color: #fff; font-size: 22px; text-align: center; padding: 20px; }
    .coins { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    .coin { position: absolute; font-size: 28px; animation: fall linear forwards; }
    @keyframes fall {
        0% { transform: translateY(-60px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
</style>
</head>
<body>
<div class="container" id="mainScreen">
    <div class="packet" onclick="startPlay()">
        <div class="circle">开</div>
        <div class="label">点击拆红包</div>
        <div class="sub">恭喜获得大额红包</div>
        <button class="btn" onclick="event.stopPropagation();startPlay()">🧧 点我领取红包 🧧</button>
    </div>
</div>
<div class="hidden container" id="playingScreen">
    <div class="msg" id="statusMsg">🎵 正在加载音频...</div>
</div>
<div class="coins" id="coins"></div>
<audio id="bgm" preload="auto"></audio>

<script>
var audio = document.getElementById('bgm');
var played = false;
var loading = false;

audio.addEventListener('canplay', function() {
    if (loading) {
        document.getElementById('statusMsg').textContent = '🎵 正在播放：听我说谢谢你';
        audio.play();
    }
});

audio.addEventListener('playing', function() {
    document.getElementById('statusMsg').textContent = '🎵 正在播放：听我说谢谢你';
});

audio.addEventListener('ended', function() {
    document.getElementById('statusMsg').textContent = '播放完毕，感谢聆听 ❤️';
});

audio.addEventListener('error', function(e) {
    document.getElementById('statusMsg').textContent = '加载失败，请检查网络后刷新页面';
});

audio.addEventListener('waiting', function() {
    document.getElementById('statusMsg').textContent = '🎵 加载中...';
});

function startPlay() {
    if (played) return;
    played = true;
    loading = true;
    
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('playingScreen').classList.remove('hidden');
    document.getElementById('statusMsg').textContent = '🎵 正在加载音频...';
    
    spawnCoins();
    
    if (!audio.src) {
        audio.src = 'music.mp4';
        audio.load();
    }
    
    // 如果已经可以播放，直接播
    if (audio.readyState >= 3) {
        audio.play().then(function() {
            loading = false;
            document.getElementById('statusMsg').textContent = '🎵 正在播放：听我说谢谢你';
        }).catch(function() {
            document.getElementById('statusMsg').textContent = '点击屏幕播放音乐';
            document.body.onclick = function() {
                audio.play().catch(function(){});
                document.getElementById('statusMsg').textContent = '🎵 正在播放：听我说谢谢你';
            };
        });
    }
}

function spawnCoins() {
    var c = document.getElementById('coins');
    var emojis = ['🪙','💰','🧧','✨','💝','🎵'];
    for (var i = 0; i < 25; i++) {
        (function(j) {
            setTimeout(function() {
                var coin = document.createElement('span');
                coin.className = 'coin';
                coin.textContent = emojis[Math.floor(Math.random()*emojis.length)];
                coin.style.left = Math.random()*90+'%';
                coin.style.animationDuration = (2+Math.random()*3)+'s';
                c.appendChild(coin);
                setTimeout(function(){ coin.remove(); }, 5000);
            }, j*150);
        })(i);
    }
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>

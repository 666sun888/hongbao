<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#c0392b">
<title>红包</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#c0392b;display:flex;justify-content:center;align-items:center;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
.packet{width:min(260px,70vw);background:linear-gradient(180deg,#e74c3c 0%,#a71d2a 100%);border-radius:24px;padding:40px 20px 30px;text-align:center;cursor:pointer;box-shadow:0 8px 50px rgba(0,0,0,0.4)}
.packet:active{transform:scale(0.96)}
.circle{width:70px;height:70px;background:#f1c40f;border-radius:50%;margin:0 auto 18px;line-height:70px;font-size:38px;font-weight:bold;color:#a71d2a}
.label{color:#f1c40f;font-size:20px;font-weight:bold;letter-spacing:3px}
.sub{color:rgba(255,255,255,0.5);font-size:14px;margin-top:10px}
.btn{display:block;margin:20px auto 0;padding:14px;background:#f1c40f;color:#a71d2a;border:none;border-radius:50px;font-size:18px;font-weight:bold;width:80%;cursor:pointer}
.hidden{display:none!important}
.msg{color:#fff;font-size:22px;text-align:center;padding:20px}
</style>
</head>
<body>
<div id="mainScreen">
<div class="packet" onclick="start()">
<div class="circle">开</div>
<div class="label">点击拆红包</div>
<div class="sub">恭喜获得大额红包</div>
<button class="btn" onclick="event.stopPropagation();start()">🧧 点我领取红包 🧧</button>
</div>
</div>
<div id="playScreen" class="hidden">
<div class="msg" id="status" style="margin-top:40vh">🎵 正在播放：听我说谢谢你</div>
</div>
<audio id="bgm" preload="auto"></audio>
<script>
var audio=document.getElementById('bgm'),played=false;
audio.addEventListener('ended',function(){document.getElementById('status').textContent='播放完毕，感谢聆听 ❤️'});
audio.addEventListener('canplay',function(){if(loading){document.getElementById('status').textContent='🎵 正在播放：听我说谢谢你';audio.volume=1.0;audio.play()}});
var loading=false;
function start(){
if(played)return;played=true;loading=true;
document.getElementById('mainScreen').classList.add('hidden');
document.getElementById('playScreen').classList.remove('hidden');
if(!audio.src){audio.src='music.mp4';audio.load()}
if(audio.readyState>=3){audio.volume=1.0;audio.play().catch(function(){})}
}
</script>
</body>
</html>

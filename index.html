<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>红包</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #c0392b;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
    .container { text-align: center; }
    .red-packet {
        width: 200px;
        height: 260px;
        background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
        border-radius: 20px;
        margin: 0 auto 30px;
        position: relative;
        cursor: pointer;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: bounce 1s infinite;
        transition: transform 0.3s;
    }
    .red-packet:active { transform: scale(0.95); }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    .red-packet .circle {
        width: 60px;
        height: 60px;
        background: #f1c40f;
        border-radius: 50%;
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: bold;
        color: #c0392b;
    }
    .red-packet .open-btn {
        position: absolute;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        color: #f1c40f;
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 2px;
        white-space: nowrap;
    }
    .red-packet .tip {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.6);
        font-size: 13px;
    }
    .main-btn {
        background: #f1c40f;
        color: #c0392b;
        border: none;
        padding: 16px 50px;
        font-size: 20px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        transition: transform 0.2s;
    }
    .main-btn:active { transform: scale(0.95); }
    .hidden { display: none !important; }
    .msg {
        color: #fff;
        font-size: 20px;
        margin-top: 20px;
        animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .coins {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 10;
    }
    .coin {
        position: absolute;
        font-size: 30px;
        animation: fall linear forwards;
    }
    @keyframes fall {
        0% { transform: translateY(-60px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
</style>
</head>
<body>
<div class="container" id="mainScreen">
    <div class="red-packet" onclick="startPlay()">
        <div class="circle">开</div>
        <div class="open-btn">点击拆红包</div>
        <div class="tip">恭喜获得大额红包</div>
    </div>
    <button class="main-btn" onclick="startPlay()">🧧 点我领取红包 🧧</button>
</div>
<div class="hidden container" id="playingScreen">
    <p class="msg" id="statusMsg">🎵 正在播放：听我说谢谢你</p>
</div>
<div class="coins" id="coins"></div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, start, dur, vol = 0.3) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, start);
    gain.gain.exponentialRampToValueAtTime(0.01, start + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + dur);
}

// 听我说谢谢你 主旋律简谱 (C 大调)
// 1=C 4/4  每个音 [频率, 开始节拍, 持续节拍]
const melody = [
    // 听我说谢谢你
    [523,0,0.5],[659,0.5,0.5],[784,1,1],        // 5 6 1'
    [784,2,0.5],[880,2.5,0.5],[784,3,1],         // 1' 2' 1'
    [659,4,0.5],[523,4.5,0.5],[659,5,0.5],[523,5.5,0.5], // 6 5 6 5
    [440,6,2],                                     // 3
    // 因为有你
    [523,8,0.5],[659,8.5,0.5],[784,9,1],
    [784,10,0.5],[880,10.5,0.5],[784,11,1],
    [659,12,0.5],[523,12.5,0.5],[659,13,0.5],[523,13.5,0.5],
    [440,14,2],
    // 温暖了四季
    [392,16,1],[440,17,0.5],[523,17.5,0.5],
    [659,18,2],
    [523,20,1],[440,21,0.5],[392,21.5,0.5],
    [349,22,2],
    // 谢谢你
    [523,24,1],[659,25,1],
    [784,26,2],
    [784,28,0.5],[880,28.5,0.5],[784,29,1],
    [659,30,1],[523,31,1],
    [440,32,3],
];

const tempo = 0.22;
let played = false;

function startPlay() {
    if (played) return;
    played = true;
    
    // 显示播放界面
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('playingScreen').classList.remove('hidden');
    
    // 金币雨
    spawnCoins();
    
    // 播放旋律
    const now = audioCtx.currentTime;
    melody.forEach(([freq, beat, dur]) => {
        playNote(freq, now + beat * tempo, dur * tempo, 0.25);
    });
    
    // 结束时更新状态
    const totalTime = now + 35 * tempo + 1;
    const checkEnd = setInterval(() => {
        if (audioCtx.currentTime >= totalTime - 1) {
            clearInterval(checkEnd);
            document.getElementById('statusMsg').textContent = '播放完毕，感谢聆听 ❤️';
            setTimeout(() => { window.close(); }, 3000);
        }
    }, 500);
}

function spawnCoins() {
    const container = document.getElementById('coins');
    const emojis = ['🪙','💰','🧧','✨','💝','🎵'];
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const coin = document.createElement('span');
            coin.className = 'coin';
            coin.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            coin.style.left = Math.random() * 90 + '%';
            coin.style.animationDuration = (2 + Math.random() * 3) + 's';
            coin.style.animationDelay = '0s';
            container.appendChild(coin);
            setTimeout(() => coin.remove(), 5000);
        }, i * 150);
    }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') window.close();
});
</script>
</body>
</html>
